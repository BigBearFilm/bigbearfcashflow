<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <title>Big Bear Cashflow</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="aurora"></div>
    <div class="login-card">
      <img class="app-icon" src="icon.png" alt="" />
      <p class="eyebrow">Big Bear Film</p>
      <h1>Big Bear Cashflow</h1>
      <p class="muted">Zaloguj się, żeby pobrać aktualny snapshot z Supabase. Aplikacja działa w trybie tylko do odczytu.</p>
      <form id="loginForm" class="form">
        <div class="field"><label>Email</label><input name="email" type="email" autocomplete="email" required></div>
        <div class="field"><label>Hasło</label><input name="password" type="password" autocomplete="current-password" required></div>
        <button class="primary" type="submit">Zaloguj i pobierz dane</button>
        <p id="loginStatus" class="small muted" style="text-align:center"></p>
      </form>
    </div>
  </section>

  <div id="app" class="app-shell hidden">
    <div class="aurora"></div>
    <header class="topbar">
      <div class="brand">
        <img class="brand-icon" src="icon.png" alt="" />
        <div>
          <div class="eyebrow">Big Bear Cashflow</div>
          <h1 id="screenTitle">Pulpit</h1>
        </div>
      </div>
      <button id="refreshButton" class="icon-btn" title="Odśwież dane" aria-label="Odśwież">↻</button>
    </header>

    <main id="view" class="view"></main>

    <nav class="tabbar" id="tabbar">
      <button data-tab="dashboard" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>
        Pulpit
      </button>
      <button data-tab="cashflow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 15l3-4 3 3 5-7"/></svg>
        Cashflow
      </button>
      <button data-tab="documents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/><path d="M10 13h5M10 16h5"/></svg>
        Dokumenty
      </button>
      <button data-tab="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a1 1 0 0 1 1-1h4l2 2h7a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/></svg>
        Projekty
      </button>
      <button id="moreButton">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="1.6"/><circle cx="18" cy="6" r="1.6"/><circle cx="6" cy="18" r="1.6"/><circle cx="18" cy="18" r="1.6"/><circle cx="12" cy="12" r="1.6"/></svg>
        Więcej
      </button>
    </nav>
  </div>

  <div id="scrim" class="scrim"></div>
  <div id="sheet" class="sheet" aria-hidden="true">
    <div class="sheet-card">
      <div class="sheet-grip"></div>
      <h2>Więcej</h2>
      <div class="sheet-grid">
        <button class="sheet-item" data-tab="personel"><span class="si lead b">PE</span>Personel</button>
        <button class="sheet-item" data-tab="firms"><span class="si lead n">FI</span>Firmy</button>
        <button class="sheet-item" data-tab="fixedCosts"><span class="si lead r">KS</span>Koszty stałe</button>
        <button class="sheet-item" data-tab="advances"><span class="si lead g">ZA</span>Zaliczki</button>
        <button class="sheet-item" data-tab="leaves"><span class="si lead b">UR</span>Urlopy</button>
      </div>
      <div class="sheet-foot">
        <button id="refreshButton2" class="btn-soft">Odśwież dane</button>
        <button id="logoutButton" class="btn-danger">Wyloguj</button>
      </div>
    </div>
  </div>

  <dialog id="modal" class="modal">
    <form method="dialog" class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button class="ghost" value="cancel" aria-label="Zamknij">✕</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions"><button class="primary" value="cancel">Zamknij</button></div>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
