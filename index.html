<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f8fb" />
  <title>Big Bear Cashflow</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <img class="app-icon" src="icon.png" alt="" />
      <p class="eyebrow">Big Bear Film</p>
      <h1>Big Bear Cashflow</h1>
      <p class="muted">Zaloguj się, żeby pobrać aktualne dane z Supabase. Aplikacja mobilna działa tylko do odczytu.</p>
      <form id="loginForm" class="form">
        <div class="field"><label>Email</label><input name="email" type="email" autocomplete="email" required></div>
        <div class="field"><label>Hasło</label><input name="password" type="password" autocomplete="current-password" required></div>
        <button class="primary" type="submit">Zaloguj i pobierz dane</button>
        <p id="loginStatus" class="small muted"></p>
      </form>
    </div>
  </section>

  <div id="app" class="app-shell hidden">
    <header class="topbar">
      <button id="menuButton" class="icon-btn" aria-label="Menu">☰</button>
      <div>
        <div class="eyebrow">Big Bear Cashflow</div>
        <h1 id="screenTitle">Pulpit</h1>
      </div>
      <button id="refreshButton" class="icon-btn" title="Odśwież dane">↻</button>
    </header>

    <aside id="drawer" class="drawer" aria-hidden="true">
      <div class="drawer-head">
        <img class="drawer-icon" src="icon.png" alt="" />
        <div><strong>Big Bear Cashflow</strong><span>Tylko do odczytu</span></div>
      </div>
      <button data-tab="dashboard" class="active">Pulpit</button>
      <button data-tab="cashflow">Cashflow</button>
      <button data-tab="documents">Dokumenty</button>
      <button data-tab="projects">Projekty</button>
      <button data-tab="personel">Personel</button>
      <button data-tab="firms">Firmy</button>
      <button data-tab="fixedCosts">Koszty stałe</button>
      <button data-tab="advances">Zaliczki</button>
      <button data-tab="leaves">Urlopy</button>
      <hr>
      <button id="logoutButton">Wyloguj</button>
    </aside>
    <div id="scrim" class="scrim"></div>

    <main id="view" class="view"></main>
  </div>

  <dialog id="modal" class="modal">
    <form method="dialog" class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button class="ghost" value="cancel">✕</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions"><button class="primary" value="cancel">Zamknij</button></div>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
